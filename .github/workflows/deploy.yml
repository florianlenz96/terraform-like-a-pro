name: Deploy Infrastructure

on:
  push:
    branches:
      - dev   # → dev stage
      - main  # → qa stage
    paths:
      - "terraform/**"
      - "function-src/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write   # Required for OIDC login
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # 1. Plan — runs immediately, no approval needed
  # ──────────────────────────────────────────────
  tf-plan:
    name: "Terraform Plan (${{ github.ref_name }})"
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: ${{ github.ref_name == 'main' && 'qa' || 'dev' }}
      TF_VAR_FILE: ${{ github.ref_name == 'main' && 'environments/qa.tfvars' || 'environments/dev.tfvars' }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"

    defaults:
      run:
        working-directory: terraform

    outputs:
      environment: ${{ env.ENVIRONMENT }}
      tf_var_file: ${{ env.TF_VAR_FILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.x"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${ENVIRONMENT}.terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file="${TF_VAR_FILE}" \
            -out=tfplan \
            -detailed-exitcode
        # exit code 0 = no changes, 1 = error, 2 = changes present — all continue here
        continue-on-error: true
        id: plan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform/tfplan
          # Short retention — plan output can expose resource attribute values
          retention-days: 1

  # ──────────────────────────────────────────────
  # 2. Apply — pauses for manual approval via
  #    GitHub Environment protection rules.
  #    Configure required reviewers in:
  #    Settings → Environments → dev / qa
  # ──────────────────────────────────────────────
  tf-apply:
    name: "Terraform Apply (${{ github.ref_name }})"
    runs-on: ubuntu-latest
    needs: tf-plan

    # Targeting a GitHub Environment triggers the required-reviewer gate.
    # Create environments named 'dev' and 'qa' in repo Settings and add reviewers.
    environment: ${{ github.ref_name == 'main' && 'qa' || 'dev' }}

    env:
      ENVIRONMENT: ${{ github.ref_name == 'main' && 'qa' || 'dev' }}
      TF_VAR_FILE: ${{ github.ref_name == 'main' && 'environments/qa.tfvars' || 'environments/dev.tfvars' }}
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.x"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${ENVIRONMENT}.terraform.tfstate"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ──────────────────────────────────────────────
  # 3. Deploy Function — runs after infra is ready
  # ──────────────────────────────────────────────
  deploy-function:
    name: "Deploy Function App (${{ github.ref_name }})"
    runs-on: ubuntu-latest
    needs: tf-apply

    env:
      ENVIRONMENT: ${{ github.ref_name == 'main' && 'qa' || 'dev' }}
      # Must match the naming convention in functions.tf:
      # func-${prefix}-${environment}-api  →  func-tlap-{env}-api
      FUNCTION_APP_NAME: func-tlap-${{ github.ref_name == 'main' && 'qa' || 'dev' }}-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Package function source
        run: |
          cd function-src
          zip -r ../function.zip .

      - name: Deploy to Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group rg-tlap-${ENVIRONMENT} \
            --name "${FUNCTION_APP_NAME}" \
            --src function.zip

